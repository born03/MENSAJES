<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teleprompter Pro Directo</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #111; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .setup-box { background: #222; padding: 20px; border-radius: 15px; max-width: 400px; margin: 50px auto; border: 1px solid #444; }
        input { width: 80%; padding: 10px; margin: 10px 0; font-size: 18px; border-radius: 5px; border: none; }
        
        .btn { padding: 15px 25px; font-size: 18px; cursor: pointer; border: none; border-radius: 8px; margin: 5px; font-weight: bold; }
        .btn-control { background: #007bff; color: white; }
        .btn-pantalla { background: #28a745; color: white; }
        .btn-send { background: #ffc107; color: black; width: 90%; }

        #panel-control, #panel-pantalla { display: none; }
        #texto-prompter { font-size: 50px; font-weight: bold; line-height: 1.5; padding-top: 40vh; text-align: center; }
        textarea { width: 90%; height: 200px; font-size: 18px; margin-top: 10px; }
        .status { color: #0f0; font-size: 14px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="setup" class="setup-box">
        <h2>Configuración</h2>
        <input type="text" id="room-id" placeholder="Código de sala (ej: 555)">
        <p>Elige la función de este dispositivo:</p>
        <button class="btn btn-pantalla" onclick="iniciarComo('pantalla')">SER PANTALLA (iPad)</button>
        <button class="btn btn-control" onclick="iniciarComo('control')">SER CONTROL (PC)</button>
    </div>

    <div id="panel-control">
        <div class="status" id="status-pc">Estado: Conectando...</div>
        <textarea id="input-texto" placeholder="Pega tu texto aquí..."></textarea><br>
        <button class="btn btn-send" onclick="enviarTexto()">ENVIAR Y EMPEZAR</button>
    </div>

    <div id="panel-pantalla">
        <div id="texto-prompter">Esperando texto del control...</div>
    </div>

    <script>
        let peer, conn;
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function iniciarComo(rol) {
            const id = document.getElementById('room-id').value;
            if (!id) return alert("Pon un número o nombre de sala");

            document.getElementById('setup').style.display = 'none';

            if (rol === 'pantalla') {
                document.getElementById('panel-pantalla').style.display = 'block';
                // El iPad se registra con el ID de la sala
                peer = new Peer('prompter-' + id);
                peer.on('open', () => console.log("iPad listo"));
                peer.on('connection', (c) => {
                    conn = c;
                    conn.on('data', (data) => ejecutarPrompter(data));
                });
            } else {
                document.getElementById('panel-control').style.display = 'block';
                peer = new Peer(); // La PC tiene ID aleatorio
                peer.on('open', () => {
                    // Intenta conectar al iPad
                    conn = peer.connect('prompter-' + id);
                    conn.on('open', () => {
                        document.getElementById('status-pc').innerText = "ESTADO: ¡CONECTADO AL IPAD!";
                    });
                });
            }
        }

        function enviarTexto() {
            const texto = document.getElementById('input-texto').value;
            if (conn && conn.open) {
                conn.send(texto);
            } else {
                alert("No hay conexión. Asegúrate que el iPad tenga el mismo código y esté en modo PANTALLA.");
            }
        }

        function ejecutarPrompter(texto) {
            // Pitido de aviso
            const osc = audioCtx.createOscillator();
            osc.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);

            const display = document.getElementById('texto-prompter');
            display.innerText = "¡ATENCIÓN!";
            
            setTimeout(() => {
                display.innerText = texto;
                let pos = 0;
                function scroll() {
                    pos += 2;
                    window.scrollTo(0, pos);
                    requestAnimationFrame(scroll);
                }
                scroll();
            }, 1500);
        }
    </script>
</body>
</html>
