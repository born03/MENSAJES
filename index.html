<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompter Automático</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: Arial; text-align: center; margin: 0; overflow-x: hidden; }
        #admin { background: #222; padding: 20px; }
        textarea { width: 90%; height: 100px; font-size: 16px; margin: 10px 0; }
        #display { font-size: 50px; font-weight: bold; padding-top: 50vh; display: none; line-height: 1.5; }
        button { padding: 15px; font-size: 18px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
        .status { font-size: 12px; color: #0f0; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="admin">
        <textarea id="textIn" placeholder="Escribe el guion aquí..."></textarea><br>
        <button onclick="enviar()">ENVIAR AL IPAD</button>
        <div id="status" class="status">Estado: Iniciando...</div>
    </div>

    <div id="display"></div>

    <script>
        // CONFIGURACIÓN AUTOMÁTICA
        const SALA_ID = "mi-prompter-unico-123"; // Cambia este número por uno tuyo
        const display = document.getElementById('display');
        const status = document.getElementById('status');
        
        // Identificar si es móvil/tablet o PC para asignar roles
        const esIpad = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        const peer = esIpad ? new Peer(SALA_ID) : new Peer();
        let conn;

        // LÓGICA RECEPTOR (IPAD)
        peer.on('open', (id) => {
            status.innerText = esIpad ? "IPAD LISTO: Esperando señal..." : "PC CONECTADA";
            if (!esIpad) {
                // La PC intenta conectar al iPad automáticamente
                setTimeout(() => {
                    conn = peer.connect(SALA_ID);
                    conn.on('open', () => status.innerText = "SINCRONIZADO CON IPAD");
                }, 2000);
            }
        });

        peer.on('connection', (c) => {
            conn = c;
            document.getElementById('admin').style.display = 'none';
            display.style.display = 'block';
            conn.on('data', (texto) => sonarYMostrar(texto));
        });

        // LÓGICA EMISOR (PC)
        function enviar() {
            const txt = document.getElementById('textIn').value;
            if (conn && conn.open) {
                conn.send(txt);
            } else {
                alert("Aún no hay conexión con el iPad. Recarga la página.");
            }
        }

        // SONIDO Y MOVIMIENTO
        function sonarYMostrar(texto) {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            osc.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5); // Pitido medio segundo

            display.innerText = "¡PREPARADO!";
            
            setTimeout(() => {
                display.innerText = texto;
                let pos = 0;
                function scroll() {
                    pos += 1.5; // Velocidad de bajada
                    window.scrollTo(0, pos);
                    requestAnimationFrame(scroll);
                }
                scroll();
            }, 2000); // Empieza 2 segundos después del pitido
        }
    </script>
</body>
</html>
