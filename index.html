<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompter Sincronizado</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #000; --text: #fff; --accent: #00ff00; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; overflow-x: hidden; }
        
        /* Panel de Control (PC) */
        #admin-panel { background: #222; padding: 20px; position: fixed; z-index: 100; width: 100%; box-sizing: border-box; }
        textarea { width: 100%; height: 100px; margin-bottom: 10px; background: #333; color: #fff; border: 1px solid #555; }
        
        /* Pantalla del Prompter (iPad) */
        #prompter-screen { 
            display: none; height: 200vh; padding-top: 50vh; text-align: center; 
            font-size: 4rem; font-weight: bold; line-height: 1.6;
        }
        
        .status { font-size: 12px; color: var(--accent); margin-bottom: 10px; }
        .hidden { display: none !important; }
        .mirror { transform: scaleX(-1); } /* Para uso con cristal */
    </style>
</head>
<body>

    <!-- INTERFAZ PC -->
    <div id="admin-panel">
        <div class="status" id="peer-id-display">Cargando ID de conexión...</div>
        <input type="text" id="target-id" placeholder="ID del iPad para conectar">
        <textarea id="script-input" placeholder="Escribe tu guion aquí..."></textarea>
        <br>
        <button onclick="connectToDevice()">1. Conectar a iPad</button>
        <button onclick="sendScript()">2. Enviar y Avisar</button>
    </div>

    <!-- INTERFAZ IPAD -->
    <div id="prompter-screen">
        <div id="display-text">Esperando guion...</div>
    </div>

    <script>
        const peer = new Peer();
        let conn;
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // Mostrar ID para que el otro dispositivo sepa a quién conectarse
        peer.on('open', (id) => {
            document.getElementById('peer-id-display').innerText = "Tu ID es: " + id;
        });

        // RECEPTOR (iPad): Cuando recibe la conexión
        peer.on('connection', (c) => {
            conn = c;
            setupReceiver();
        });

        function setupReceiver() {
            document.getElementById('admin-panel').classList.add('hidden');
            document.getElementById('prompter-screen').style.display = 'block';
            
            conn.on('data', (data) => {
                if (data.type === 'new_script') {
                    prepareSpeech(data.text);
                }
            });
        }

        // EMISOR (PC): Conectar manualmente si es necesario
        function connectToDevice() {
            const targetId = document.getElementById('target-id').value;
            conn = peer.connect(targetId);
            conn.on('open', () => {
                alert("¡Conectado al iPad!");
            });
        }

        function sendScript() {
            const text = document.getElementById('script-input').value;
            if (conn) {
                conn.send({ type: 'new_script', text: text });
            }
        }

        // FUNCIÓN DE SONIDO Y LANZAMIENTO
        function playBeep(callback) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = 880; // La nota La
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 1);
            osc.start();
            osc.stop(audioCtx.currentTime + 1);
            
            setTimeout(callback, 1500); // Espera 1.5 seg tras el sonido
        }

        function prepareSpeech(text) {
            const display = document.getElementById('display-text');
            display.innerHTML = "PREPARADO...";
            
            playBeep(() => {
                display.innerHTML = text.replace(/\n/g, '<br>');
                startScrolling();
            });
        }

        function startScrolling() {
            let scrollPos = 0;
            const scroll = () => {
                scrollPos += 2; // Velocidad
                window.scrollTo(0, scrollPos);
                requestAnimationFrame(scroll);
            };
            scroll();
        }
    </script>
</body>
</html>
