<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompter Sync v2</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; }
        
        /* SEMÁFORO DE CONEXIÓN */
        #status-bar { 
            padding: 10px; background: #222; display: flex; 
            align-items: center; justify-content: center; gap: 10px; 
        }
        #light { width: 15px; height: 15px; background: red; border-radius: 50%; box-shadow: 0 0 10px red; }
        
        #admin { padding: 20px; }
        textarea { width: 90%; height: 150px; font-size: 18px; margin: 15px 0; border-radius: 10px; }
        #display { font-size: 55px; font-weight: bold; padding-top: 40vh; display: none; line-height: 1.4; }
        
        button { 
            padding: 15px 30px; font-size: 20px; font-weight: bold;
            cursor: pointer; background: #28a745; color: white; border: none; border-radius: 8px; 
        }
        button:disabled { background: #555; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="status-bar">
        <div id="light"></div>
        <span id="status-text">Desconectado</span>
    </div>

    <div id="admin">
        <textarea id="textIn" placeholder="Escribe aquí tu guion..."></textarea><br>
        <button id="btnEnviar" onclick="enviar()" disabled>ENVIAR AL IPAD</button>
    </div>

    <div id="display"></div>

    <script>
        const SALA_ID = "mi-sala-privada-2026"; // ASEGÚRATE QUE SEA IGUAL EN AMBOS
        const light = document.getElementById('light');
        const statusText = document.getElementById('status-text');
        const btn = document.getElementById('btnEnviar');
        const display = document.getElementById('display');
        
        const esIpad = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        const peer = esIpad ? new Peer(SALA_ID) : new Peer();
        let conn;

        // Cambiar color del semáforo
        function conectado() {
            light.style.background = "#0f0";
            light.style.boxShadow = "0 0 15px #0f0";
            statusText.innerText = "¡CONECTADO!";
            btn.disabled = false;
        }

        peer.on('open', () => {
            statusText.innerText = esIpad ? "IPAD: Esperando PC..." : "PC: Buscando iPad...";
            if (!esIpad) {
                const intentarConectar = () => {
                    conn = peer.connect(SALA_ID);
                    conn.on('open', () => conectado());
                    // Si falla, reintenta cada 3 segundos
                    conn.on('error', () => setTimeout(intentarConectar, 3000));
                };
                intentarConectar();
            }
        });

        // El iPad detecta cuando la PC se conecta a él
        peer.on('connection', (c) => {
            conn = c;
            conectado();
            conn.on('data', (texto) => sonarYMostrar(texto));
        });

        function enviar() {
            if (conn && conn.open) {
                conn.send(document.getElementById('textIn').value);
            }
        }

        function sonarYMostrar(texto) {
            // Pitido de alerta
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            osc.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.6);

            document.getElementById('admin').style.display = 'none';
            display.style.display = 'block';
            display.innerText = "3... 2... 1...";
            
            setTimeout(() => {
                display.innerText = texto;
                let pos = 0;
                function scroll() {
                    pos += 1.8; // Velocidad
                    window.scrollTo(0, pos);
                    requestAnimationFrame(scroll);
                }
                scroll();
            }, 2000);
        }
    </script>
</body>
</html>
