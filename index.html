<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompter Realtime</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; margin: 0; text-align: center; }
        .box { background: #222; padding: 20px; border-radius: 10px; display: inline-block; margin-top: 50px; border: 1px solid #444; }
        input, textarea { width: 90%; padding: 10px; margin: 10px 0; font-size: 18px; border-radius: 5px; }
        button { padding: 15px 25px; font-size: 18px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; }
        
        #panel-control, #panel-pantalla { display: none; padding: 20px; }
        #texto-prompter { font-size: 70px; font-weight: bold; height: 90vh; display: flex; align-items: center; justify-content: center; padding: 20px; line-height: 1.2; }
        
        .status { padding: 10px; color: #ff4757; font-weight: bold; }
        .online { color: #2ed573; }
        #historial { margin-top: 20px; text-align: left; background: #111; padding: 10px; height: 150px; overflow-y: auto; font-size: 12px; }
    </style>
</head>
<body>

    <div id="setup">
        <div class="box">
            <h2>Paso 1: Código de Sala</h2>
            <input type="text" id="room-id" placeholder="Ejemplo: sala123">
            <br>
            <button style="background: #28a745; color:white" onclick="iniciar('pantalla')">SOY EL IPAD</button>
            <button style="background: #007bff; color:white" onclick="iniciar('control')">SOY LA PC</button>
        </div>
    </div>

    <div id="panel-control">
        <div id="status-pc" class="status">🔴 Desconectado del iPad</div>
        <textarea id="input-texto" placeholder="Escribe aquí y pulsa ENTER..."></textarea>
        <br>
        <button style="background: #2ed573; color:white; width:90%" onclick="enviar()">ENVIAR (O pulsa Enter)</button>
        <div id="historial"></div>
    </div>

    <div id="panel-pantalla">
        <div id="status-ipad" class="status">Esperando conexión...</div>
        <div id="texto-prompter">EL TEXTO APARECERÁ AQUÍ</div>
    </div>

    <script>
        let peer, conn, audioCtx;

        // --- FUNCIÓN PARA EL ENTER ---
        document.getElementById('input-texto').onkeypress = function(e) {
            if (e.keyCode === 13 && !e.shiftKey) {
                e.preventDefault(); // Evita el salto de línea
                enviar();
            }
        };

        function iniciar(rol) {
            const id = document.getElementById('room-id').value;
            if (!id) return alert("Escribe un código primero");

            // Desbloquear audio
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById('setup').style.display = 'none';

            if (rol === 'pantalla') {
                document.getElementById('panel-pantalla').style.display = 'block';
                peer = new Peer('room-' + id);
                
                peer.on('open', () => {
                    document.getElementById('status-ipad').innerText = "✅ iPad listo. Código: " + id;
                });

                peer.on('connection', (c) => {
                    conn = c;
                    document.getElementById('status-ipad').innerHTML = "<span class='online'>✅ PC CONECTADA</span>";
                    conn.on('data', (data) => {
                        recibirEnIpad(data);
                    });
                });
            } else {
                document.getElementById('panel-control').style.display = 'block';
                peer = new Peer();
                
                // Intentar conectar
                setTimeout(() => {
                    conn = peer.connect('room-' + id);
                    conn.on('open', () => {
                        document.getElementById('status-pc').innerHTML = "<span class='online'>✅ CONECTADO AL IPAD</span>";
                    });
                }, 1000);
            }
        }

        function enviar() {
            const val = document.getElementById('input-texto').value.trim();
            if (val && conn && conn.open) {
                conn.send(val);
                // Agregar al historial local
                const h = document.getElementById('historial');
                h.innerHTML = `<div>[${new Date().toLocaleTimeString()}] ${val.substring(0,30)}...</div>` + h.innerHTML;
                document.getElementById('input-texto').value = "";
            } else {
                alert("No hay conexión. ¿El iPad está en modo pantalla?");
            }
        }

        function recibirEnIpad(texto) {
            // Sonido largo y notorio
            if (audioCtx) {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.type = 'square'; // Sonido más fuerte tipo alarma
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.5);
                
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.8);
                
                osc.start();
                osc.stop(audioCtx.currentTime + 0.8);
            }
            
            document.getElementById('texto-prompter').innerText = texto;
        }
    </script>
</body>
</html>
