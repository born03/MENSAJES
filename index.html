<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompter Fijo con Alerta</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: white; font-family: 'Helvetica', sans-serif; margin: 0; padding: 0; overflow: hidden; }
        
        /* SETUP */
        #bloqueo-audio { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #111; z-index: 1000; display: flex; align-items: center; justify-content: center; 
        }
        .setup-box { background: #222; padding: 30px; border-radius: 15px; text-align: center; border: 1px solid #444; }
        input { width: 80%; padding: 12px; margin-bottom: 20px; font-size: 20px; border-radius: 5px; text-align: center; }
        
        .btn { padding: 15px 25px; font-size: 18px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; }
        .btn-activar { background: #ff4757; color: white; }
        .btn-control { background: #1e90ff; color: white; margin-left: 10px; }
        .btn-send { background: #2ed573; color: white; width: 100%; margin-top: 10px; height: 50px; }

        /* PANEL CONTROL (PC) */
        #panel-control { display: none; padding: 20px; max-width: 600px; margin: 0 auto; }
        textarea { 
            width: 100%; height: 150px; font-size: 20px; background: #222; color: #fff; 
            border: 2px solid #444; padding: 15px; border-radius: 10px; box-sizing: border-box;
        }
        
        /* HISTORIAL */
        #historial { 
            margin-top: 20px; background: #1a1a1a; border-radius: 10px; 
            padding: 10px; border: 1px solid #333; height: 250px; overflow-y: auto;
        }
        .msg-item { padding: 8px; border-bottom: 1px solid #333; font-size: 13px; display: flex; gap: 10px; }
        .msg-time { color: #888; font-family: monospace; }

        /* PANTALLA IPAD (TEXTO FIJO Y GRANDE) */
        #panel-pantalla { 
            display: none; height: 100vh; width: 100vw;
            display: flex; align-items: center; justify-content: center;
        }
        #texto-prompter { 
            font-size: 80px; /* Tamaño muy grande para iPad */
            font-weight: bold; 
            text-align: center; 
            width: 90%;
            line-height: 1.2;
            word-wrap: break-word;
        }
        .status { color: #2ed573; text-align: center; padding: 10px; font-size: 12px; }
    </style>
</head>
<body>

    <div id="bloqueo-audio">
        <div class="setup-box">
            <h2>Configuración</h2>
            <input type="text" id="room-id" placeholder="Código de Sala">
            <br>
            <button class="btn btn-activar" onclick="iniciarComo('pantalla')">IPAD: RECIBIR</button>
            <button class="btn btn-control" onclick="iniciarComo('control')">PC: CONTROL</button>
        </div>
    </div>

    <div id="panel-control">
        <div class="status" id="status-pc">🔴 Desconectado</div>
        <textarea id="input-texto" placeholder="Escribe el mensaje y presiona Enter..."></textarea>
        <button class="btn btn-send" onclick="enviarTexto()">ENVIAR AHORA</button>

        <div id="historial">
            <div id="lista-mensajes"></div>
        </div>
    </div>

    <div id="panel-pantalla" style="display:none;">
        <div id="texto-prompter">...</div>
    </div>

    <script>
        let peer, conn, audioCtx;

        document.getElementById('input-texto').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                enviarTexto();
            }
        });

        function iniciarComo(rol) {
            const id = document.getElementById('room-id').value;
            if (!id) return alert("Pon un código");
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById('bloqueo-audio').style.display = 'none';

            if (rol === 'pantalla') {
                document.getElementById('panel-pantalla').style.display = 'flex';
                peer = new Peer('p-room-' + id);
                peer.on('connection', (c) => {
                    conn = c;
                    conn.on('data', (data) => actualizarPantalla(data));
                });
            } else {
                document.getElementById('panel-control').style.display = 'block';
                peer = new Peer();
                peer.on('open', () => {
                    conn = peer.connect('p-room-' + id);
                    conn.on('open', () => document.getElementById('status-pc').innerText = "✅ CONECTADO");
                });
            }
        }

        function enviarTexto() {
            const area = document.getElementById('input-texto');
            const texto = area.value.trim();
            if (texto && conn && conn.open) {
                conn.send(texto);
                agregarAlHistorial(texto);
                area.value = "";
            }
        }

        function agregarAlHistorial(msg) {
            const lista = document.getElementById('lista-mensajes');
            const item = document.createElement('div');
            item.className = 'msg-item';
            const hora = new Date().toLocaleTimeString();
            item.innerHTML = `<span class="msg-time">[${hora}]</span> <span>${msg.substring(0, 40)}...</span>`;
            lista.prepend(item);
        }

        // SONIDO DOBLE (Bi-Bip)
        function sonarAlerta() {
            if (!audioCtx) return;
            const t = audioCtx.currentTime;
            
            function pitar(delay, freq) {
                const osc = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                osc.connect(g);
                g.connect(audioCtx.destination);
                osc.frequency.setValueAtTime(freq, t + delay);
                g.gain.setValueAtTime(0.3, t + delay);
                g.gain.exponentialRampToValueAtTime(0.01, t + delay + 0.3);
                osc.start(t + delay);
                osc.stop(t + delay + 0.3);
            }

            pitar(0, 880);   // Primer pitido
            pitar(0.4, 1000); // Segundo pitido un poco más agudo
        }

        function actualizarPantalla(texto) {
            sonarAlerta();
            const display = document.getElementById('texto-prompter');
            display.innerText = texto; // El texto aparece y se queda fijo
        }
    </script>
</body>
</html>
