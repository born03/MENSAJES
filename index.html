<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompter Auto-Sync</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; overflow: hidden; text-align: center; }
        
        /* PANTALLA DE ACTIVACIÓN (PARA EL SONIDO EN IPAD) */
        #overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #111; z-index: 9999; display: flex; align-items: center; justify-content: center; 
        }
        .btn-start { padding: 30px 60px; font-size: 24px; background: #2ed573; color: white; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; }

        /* INTERFAZ CONTROL (PC) */
        #control-panel { display: none; padding: 20px; }
        textarea { width: 95%; height: 200px; font-size: 20px; background: #222; color: #fff; border: 2px solid #444; border-radius: 10px; padding: 15px; }
        .status { padding: 10px; font-weight: bold; font-size: 14px; }
        .history { margin-top: 20px; text-align: left; background: #111; height: 150px; overflow-y: auto; padding: 10px; border: 1px solid #333; font-size: 13px; color: #888; }

        /* INTERFAZ PANTALLA (IPAD) */
        #display-panel { display: none; height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        #prompter-text { font-size: 80px; font-weight: bold; line-height: 1.2; width: 100%; }
    </style>
</head>
<body>

    <!-- Botón obligatorio para habilitar sonido y conexión -->
    <div id="overlay">
        <button class="btn-start" onclick="iniciar()">EMPEZAR / ACTIVAR SONIDO</button>
    </div>

    <!-- VISTA PC -->
    <div id="control-panel">
        <div id="status-pc" class="status" style="color: #ff4757;">🔴 BUSCANDO IPAD...</div>
        <textarea id="msg-input" placeholder="Escribe aquí y pulsa ENTER..."></textarea>
        <div class="history" id="history-log">Historial de envíos:</div>
    </div>

    <!-- VISTA IPAD -->
    <div id="display-panel">
        <div id="prompter-text">ESPERANDO MENSAJE...</div>
    </div>

    <script>
        // --- CONFIGURACIÓN FIJA ---
        const MI_SALA_SECRETA = "mi-teleprompter-personal-2026"; // No necesitas cambiar esto
        let peer, conn, audioCtx;

        // Detectar dispositivo
        const esMovil = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

        function iniciar() {
            document.getElementById('overlay').style.display = 'none';
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            if (esMovil) {
                // MODO IPAD (RECEPTOR)
                document.getElementById('display-panel').style.display = 'flex';
                peer = new Peer(MI_SALA_SECRETA);
                
                peer.on('connection', (c) => {
                    conn = c;
                    conn.on('data', (data) => {
                        lanzarMensaje(data);
                    });
                });
            } else {
                // MODO PC (EMISOR)
                document.getElementById('control-panel').style.display = 'block';
                peer = new Peer();
                
                // Intentar conectar automáticamente al abrir
                const intentarConexion = () => {
                    conn = peer.connect(MI_SALA_SECRETA);
                    conn.on('open', () => {
                        document.getElementById('status-pc').innerText = "✅ CONECTADO AL IPAD";
                        document.getElementById('status-pc').style.color = "#2ed573";
                    });
                };
                
                setTimeout(intentarConexion, 1500); // Dar un segundo para que PeerJS inicie
            }
        }

        // --- LÓGICA DE ENVÍO (ENTER) ---
        document.getElementById('msg-input').addEventListener('keydown', function(e) {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                enviar();
            }
        });

        function enviar() {
            const input = document.getElementById('msg-input');
            const texto = input.value.trim();
            if (texto && conn && conn.open) {
                conn.send(texto);
                // Log de historial
                const log = document.getElementById('history-log');
                const hora = new Date().toLocaleTimeString();
                log.innerHTML = `<div>[${hora}] Sent: ${texto.substring(0,30)}...</div>` + log.innerHTML;
                input.value = "";
            }
        }

        // --- LÓGICA DE RECEPCIÓN Y SONIDO ---
        function lanzarMensaje(texto) {
            // Sonido potente (Doble pulso)
            const t = audioCtx.currentTime;
            const pitar = (freq, start) => {
                const osc = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(freq, t + start);
                g.gain.setValueAtTime(0.15, t + start);
                g.gain.exponentialRampToValueAtTime(0.01, t + start + 0.4);
                osc.connect(g);
                g.connect(audioCtx.destination);
                osc.start(t + start);
                osc.stop(t + start + 0.4);
            }
            
            pitar(440, 0);   // Pitido 1
            pitar(660, 0.5); // Pitido 2 (más agudo)

            document.getElementById('prompter-text').innerText = texto;
        }
    </script>
</body>
</html>
